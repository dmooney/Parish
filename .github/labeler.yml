# PR Labeler Configuration (v5+ format)
#
# Maps modified paths to labels. Used by .github/workflows/label.yml

frontend:
  - changed-files:
      - any-glob-to-any-file: apps/ui/**/*

infra:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
          - deploy/**/*
          - .claude/**/*
          - justfile
          - Cargo.toml
          - Cargo.lock

docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**/*
          - README.md
          - LICENSE
          - NOTICE
          - THIRD_PARTY_NOTICES.md
          - AGENTS.md
          - CLAUDE.md

rundale:
  - changed-files:
      - any-glob-to-any-file: mods/rundale/**/*

parish-core:
  - changed-files:
      - any-glob-to-any-file: crates/parish-core/**/*

