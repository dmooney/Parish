# Marks issues and PRs stale after 90 days of inactivity, then closes them
# after a further 14 days unless they receive new activity.
name: Mark stale issues and pull requests

on:
  schedule:
  - cron: '36 4 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 90
        days-before-close: 14
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
        stale-issue-message: >
          This issue has been inactive for 90 days. It will be closed in 14 days
          unless there is new activity. If this is still relevant, please leave a
          comment or remove the `no-issue-activity` label.
        stale-pr-message: >
          This pull request has been inactive for 90 days. It will be closed in
          14 days unless there is new activity. If this is still relevant, please
          leave a comment, push a new commit, or remove the `no-pr-activity` label.
        close-issue-message: >
          Closing due to 14 days of inactivity after being marked stale. Feel free
          to reopen if this is still relevant.
        close-pr-message: >
          Closing due to 14 days of inactivity after being marked stale. Feel free
          to reopen if this is still relevant.
